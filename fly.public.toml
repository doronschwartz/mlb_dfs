# Public product deploy — same image/engine as the private league app, but
# PUBLIC_MODE hides the league tooling (drafts/Fantrax/trivia) and serves the
# public projections + dynasty + accuracy site.
#
# Deploy:   flyctl deploy -c fly.public.toml
# First time, create the app + set secrets:
#   flyctl apps create mlb-dfs-public
#   flyctl secrets set -a mlb-dfs-public ODDS_API_KEY=... \
#       AFFILIATE_FANTRAX=... AFFILIATE_DK=... AFFILIATE_FD=...
# Point a domain:  flyctl certs add -a mlb-dfs-public yourdomain.com
app = "mlb-dfs-public"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  PUBLIC_MODE = "true"
  # NOTE: no disk-cache volume — a single warm machine (min_machines_running=1)
  # keeps the in-memory projection/dynasty/accuracy caches resident, which is
  # enough. (A persistent volume fought the single-machine rolling deploy; the
  # warm machine + accuracy snapshot already eliminate the cold-compute 502s.)

[http_service]
  internal_port = 8080
  force_https = true
  # SCALE-TO-ZERO until launch (2026-07-06): /api/stats shows literally zero
  # visitors, so the always-on machine (~$10/mo) was insurance for nobody.
  # First visitor after idle eats a cold start — acceptable pre-launch.
  # >>> FLIP BACK on launch day (min_machines_running = 1, auto_stop
  # "suspend") — it's step 0 of the Reddit-post checklist. <<<
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  # Tolerant: the first cold slate compute of the day pegs CPU and a 5s
  # timeout marked the app dead right as the league woke (2026-07-03
  # 07:51/08:32 → intermittent user failures). 15s timeout + longer grace
  # rides out compute spikes; daily_health also pre-warms the slate at
  # 05:00 ET so the morning cold hit mostly no longer exists.
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "15s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"  # 2GB: live Stuff+ pulls ~60k Statcast rows + trains XGBoost per pitch type
