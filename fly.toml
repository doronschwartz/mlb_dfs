app = "mlb-dfs-doron"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  MLB_DFS_DRAFT_DIR = "/data/drafts"

[[mounts]]
  source = "drafts"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

# 2GB RAM — 1GB still OOM'd 3x on 2026-06-11 during full-history cold
# recomputes (25 sequential project_slate calls; the v9.39+ chain also holds
# Savant arsenal leaderboards in memory). 2GB matches the public app.
[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"
