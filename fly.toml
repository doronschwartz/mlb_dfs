app = "mlb-dfs-doron"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  MLB_DFS_DRAFT_DIR = "/data/drafts"

[[mounts]]
  source = "drafts"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

# 1GB RAM — 512MB triggered OOM kills during concurrent cold-cache projection
# computes (each project_slate holds ~400 projections + Statcast caches).
# Observed process RSS spike to 395MB; 1024MB gives ~2.5x headroom.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
